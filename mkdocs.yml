site_name: lazyenv
site_description: A beautiful TUI for managing .env files — like lazygit for environment variables
site_url: https://lazyenv.dev
repo_url: https://github.com/lazyenv/lazyenv
repo_name: lazyenv/lazyenv
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - TUI Interface: guide/tui.md
    - Diff & Validation: guide/diff.md
    - CLI Reference: guide/cli.md
    - Key Bindings: guide/keybindings.md
  - Integration:
    - CI/CD: integration/ci.md
    - Git Hooks: integration/hooks.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lazyenv/lazyenv
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/lazyenv/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/lazyenv
  analytics:
    provider: google
    property: G-XXXXXXXXXX
