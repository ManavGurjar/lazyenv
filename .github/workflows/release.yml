name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: lazyenv-linux-amd64
          - os: macos-latest
            asset_name: lazyenv-macos-amd64
          - os: windows-latest
            asset_name: lazyenv-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install PyInstaller
        run: uv pip install --system pyinstaller -e .
      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name ${{ matrix.asset_name }} \
            --add-data "src/lazyenv/styles:lazyenv/styles" \
            src/lazyenv/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system hatch
      - run: hatch build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            pip install lazyenv
            # or
            uv tool install lazyenv
            ```

            Or download a binary for your platform above.
