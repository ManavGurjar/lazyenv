name: Feature Request
description: Suggest an idea for lazyenv
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the pain point you're facing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Parser (reading .env files)
        - TUI (visual interface)
        - Diff (comparing files)
        - CLI (command-line flags)
        - Integration (editor, shell, etc.)
        - Documentation
        - Other
    validations:
      required: true
