name: Bug Report
description: Something isn't working
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `lazyenv /path/to/project`
        2. Press `d` to open diff
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: lazyenv version
      placeholder: "0.1.0 (run `lazyenv --version`)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true

  - type: textarea
    id: env-sample
    attributes:
      label: Sample .env file (redact secrets!)
      description: A minimal .env file that reproduces the issue
      render: bash
